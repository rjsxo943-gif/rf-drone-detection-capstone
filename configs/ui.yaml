refresh_ms: 100

display:
  show_spectrogram: true
  show_detector_status: true
  show_cnn_result: true
  show_aoa: false # 현재 AoA 계산은 CNN 결과와 연결하는 gate가 없어서 UI에서는 숨김
  show_block_index: true
  show_confidence: true

spectrogram:
  enabled: true

  # 현재 RF3 CNN 입력 spectrogram 기준
  expected_shape: [128, 509]

  show_log_scale: true
  show_latest_only: true



# configs/ui.yaml
#
# UI / 시각화 / 대시보드 설정 파일
#
# 현재 프로젝트 기준:
# - 처리 단위는 block
# - 1 block = 16,384 samples
# - 현재 RF3 CNN은 Background / Bluetooth / WiFi 3분류 모델
# - RF3 CNN 입력 spectrogram shape = [128, 509]
# - Drone-like 클래스와 AoA gate는 추후 드론 데이터 확보 후 확장 예정

# ============================================================
# OpenCV Live RF Viewer
# ============================================================
#
# scripts/live_rf_viewer_drone_aoa.py 전용 runtime/viewer 정책.
#
# 원칙:
# - receiver / ml / aoa 물리·모델 파라미터는 각 YAML에서 관리한다.
# - 여기서는 OpenCV viewer의 update 방식, 대표 block 선택, CLI 로그 주기만 관리한다.
# - CLI 인자는 임시 실험 override 용도로만 사용한다.
live_rf_viewer:
  # 한 번의 viewer update에서 읽을 RF block 개수.
  # 여러 block 중 대표 block 하나를 골라 CNN/AoA에 넣는다.
  # 값이 클수록 Drone voting/AoA는 안정적이지만 화면 업데이트는 느려진다.
  blocks_per_update: 20

  # 대표 block 선택 정책.
  # raw_gate_pass_score_max:
  #   raw noise gate를 통과한 block 중 score_max가 가장 큰 block 선택.
  #   통과 block이 없으면 전체 중 score_max 최대 block 선택.
  #   이후 raw gate fail이면 CNN/AoA는 그대로 막힌다.
  #
  # 사용 가능:
  # - raw_gate_pass_score_max
  # - raw_gate_score_max
  # - raw_p99
  # - frame_power_p99
  # - last
  select_policy: raw_gate_pass_score_max

  # 터미널 상태 로그 출력 주기.
  # 1이면 매 update set마다 한 줄 출력.
  # 너무 빠르면 3, 5, 10으로 올린다.
  cli_log_every_n: 1

  # true면 터미널 주기 로그 비활성화.
  disable_cli_log: false

  # ==========================================================
  # AoA display gate
  # ==========================================================
  # detection_confirmed와 AoA 표시 조건을 분리한다.
  #
  # 목적:
  # - CNN voting confirmed 상태가 유지되더라도,
  #   현재 selected block이 NotDrone이면 AoA를 표시하지 않는다.
  # - coherence가 낮은 위상 불안정 block은 각도 표시에서 제외한다.
  #
  # 권장:
  # - 시연/보고서용: min_current_confidence=0.90~0.95, min_coherence=0.90
  # - 실험/튜닝용:   min_current_confidence=0.85,      min_coherence=0.85
  aoa_gate:
    enabled: true
    require_voting_confirmed: true
    require_current_drone: true
    min_current_confidence: 0.90
    min_coherence: 0.70
    display_only_valid: true
    show_skip_reason: true

# ============================================================
# OpenCV Sector Dashboard
# ============================================================
# scripts/experimental/live_aoa_sector_dashboard.py 전용 표시 설정.
#
# 원칙:
# - CNN / RawNoiseGate / AoA / coherence / sector 판단 정책은 바꾸지 않는다.
# - 이 dashboard는 기존 판단 결과를 받아서 시각화만 한다.
sector_dashboard:
  enabled: true

  show_spectrogram: false

  show_sector: true
  show_angle_text: true
  show_coherence: true
  show_p99: true
  p99_source: median_raw_p99

  sector_display_mode: seven

  blink_on_hold: true
  fade_on_signal_lost: true

  canvas_width: 1320
  canvas_height: 720

  distance:
    enabled: true
    show_rings: false
    profile_path: outputs/sector_range_profiles/gain35_cf2450000000_nearfar_profile.json
    mode: within9m_vs_9to15m_experimental
    min_reliability: LOW
    min_margin_for_range: 0.25
