# configs/ml.yaml
#
# CNN / STFT / 모델 저장 경로 설정 파일
#
# 원칙:
# - 모델 경로, 클래스 이름, Drone 판단 임계값, temporal voting 조건은 여기서만 관리한다.
# - viewer / CLI / runtime 코드는 이 YAML 값을 읽어서 사용한다.
# - 코드 내부 hardcoded model path / class_names / threshold 사용을 금지한다.
#
# 현재 프로젝트 기준:
# - 전체 처리 단위는 block
# - 1 block = 16,384 IQ samples
# - block 하나에서 STFT spectrogram 생성
# - runtime CNN은 Drone / NotDrone 2-class binary 모델 사용

block_size: 16384

# ============================================================
# Class definition
# ============================================================

num_classes: 2

class_names:
  - NotDrone
  - Drone

negative_class: NotDrone
positive_class: Drone

# CNN branch에서 사용할 RX 채널 선택
# Pluto+ 2채널 입력 shape = (2, 16384)
# rx_index: 0이면 RX0 사용
# rx_index: 1이면 RX1 사용
cnn_input:
  rx_index: 0

# ============================================================
# STFT / Spectrogram
# ============================================================

stft:
  nperseg: 128
  noverlap: 96
  hop_length: 32
  nfft: 128
  window: hann

  expected_freq_bins: 128
  expected_time_frames: 509

  # 복소 IQ 신호이므로 양방향 주파수 bin 사용
  onesided: false

  # 주파수 0Hz 성분을 가운데로 정렬
  fftshift: true

spectrogram:
  image_height: 128
  image_width: 509
  input_channels: 1
  input_shape: [128, 509, 1]

  resize: false
  use_log_scale: true
  normalize: true
  normalize_method: minmax

# ============================================================
# Model
# ============================================================

model:
  type: binary_2d_cnn
  binary_model_path: outputs/ml/rf4_binary_20260530_no_controller_lr1e3_v2/best_model.pt

  # legacy / unused paths. 유지하되 runtime에서는 inference.model_path를 우선 사용한다.
  model_path: models/checkpoints/model.keras
  best_model_path: models/checkpoints/best_model.keras
  torch_model_path: models/checkpoints/model_torch.pth
  best_torch_model_path: models/checkpoints/best_model_torch.pth

train:
  batch_size: 32
  epochs: 50
  learning_rate: 0.001
  validation_split: 0.2
  seed: 42

export:
  tflite_path: models/tflite/model.tflite
  quantize: false

# ============================================================
# Runtime inference / decision policy
# ============================================================

inference:
  # Drone / NotDrone binary classifier
  backend: binary_flat
  model_path: outputs/ml/rf4_binary_20260530_no_controller_lr1e3_v2/best_model.pt
  device: cpu

  # fallback threshold. gain별 policy에 매칭되지 않으면 이 값을 사용한다.
  drone_threshold: 0.50
  general_threshold: 0.50

  # ----------------------------------------------------------
  # Gain-dependent Drone threshold policy
  # ----------------------------------------------------------
  # gain < 25        -> 0.50
  # 25 <= gain < 30  -> 0.35
  # gain >= 30       -> 0.80
  # ----------------------------------------------------------
  gain_threshold_policy:
    enabled: true
    default_drone_threshold: 0.50

    rules:
      - name: gain_25_sensitive
        min_gain: 25
        max_gain: 29.999
        drone_threshold: 0.35

      - name: gain_30_or_higher_strict
        min_gain: 30
        max_gain: null
        drone_threshold: 0.80

  # ----------------------------------------------------------
  # Temporal voting
  # ----------------------------------------------------------
  # 단일 block만 보고 Drone 확정하지 않는다.
  # 최근 5개 precision/viewer decision 중:
  # - 2개 이상 Drone이면 candidate
  # - 3개 이상 Drone이면 confirmed
  # AoA는 confirmed 이후에만 실행한다.
  # ----------------------------------------------------------
  temporal_voting:
    enabled: true
    window_size: 5
    candidate_vote_k: 2
    confirmed_vote_k: 3
    positive_class: Drone
    negative_class: NotDrone
    require_confirmed_before_aoa: true
    reject_to_scan: true
