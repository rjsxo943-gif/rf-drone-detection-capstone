# configs/ml.yaml
#
# CNN / STFT / 모델 저장 경로 설정 파일
#
# 원칙:
# - 모델 경로, 클래스 이름, Drone 판단 임계값, temporal voting 조건은 여기서만 관리한다.
# - raw safety / overload 판단 기준도 여기서만 관리한다.
# - viewer / CLI / runtime 코드는 이 YAML 값을 읽어서 사용한다.
# - 코드 내부 hardcoded model path / class_names / threshold 사용을 금지한다.
#
# 현재 프로젝트 기준:
# - 전체 처리 단위는 block
# - 1 block = 16,384 IQ samples
# - block 하나에서 STFT spectrogram 생성
# - runtime CNN은 Drone / NotDrone 2-class binary 모델 사용

block_size: 16384

# ============================================================
# Class definition
# ============================================================

num_classes: 2

class_names:
  - NotDrone
  - Drone

negative_class: NotDrone
positive_class: Drone

# CNN branch에서 사용할 RX 채널 선택
# Pluto+ 2채널 입력 shape = (2, 16384)
# rx_index: 0이면 RX0 사용
# rx_index: 1이면 RX1 사용
cnn_input:
  rx_index: 0

# ============================================================
# STFT / Spectrogram
# ============================================================

stft:
  nperseg: 128
  noverlap: 96
  hop_length: 32
  nfft: 128
  window: hann

  expected_freq_bins: 128
  expected_time_frames: 509

  # 복소 IQ 신호이므로 양방향 주파수 bin 사용
  onesided: false

  # 주파수 0Hz 성분을 가운데로 정렬
  fftshift: true

spectrogram:
  image_height: 128
  image_width: 509
  input_channels: 1
  input_shape: [128, 509, 1]

  resize: false
  use_log_scale: true
  normalize: true
  normalize_method: minmax

# ============================================================
# Raw safety / viewer status policy
# ============================================================
# 중요:
# - receiver raw IQ는 현재 [-1, 1] 정규화 스케일이 아니다.
# - 따라서 overload_peak=0.95 같은 정규화 기준을 쓰면 대부분 가짜 OVERLOAD가 된다.
# - raw safety 판단은 여기 YAML 기준만 사용한다.
# - 실제 ADC saturation 기준이 확인되면 raw_peak_overload를 그 값에 맞춰 조정한다.

raw_safety:
  enabled: true
  scale_mode: raw_adc_like

  # signal_ratio = frame_power_p99 / frame_power_median
  no_signal_ratio: 2.0
  valid_signal_ratio: 5.0

  overload:
    enabled: true

    # raw_peak가 이 값 이상이면 OVERLOAD로 판단한다.
    # 기존 0.95는 normalized IQ 기준이라 현재 raw scale과 맞지 않는다.
    raw_peak_overload: 30000.0

    # abs(raw) >= raw_peak_overload 인 샘플 비율이 이 값 이상이면 OVERLOAD.
    clip_ratio_overload: 0.001

    # true이면 OVERLOAD block은 CNN 판정에서 제외할 수 있다.
    # 현재는 false로 두어 로그 확인을 우선한다.
    skip_cnn_on_overload: false

# ============================================================
# Model
# ============================================================

model:
  type: binary_2d_cnn

  # ----------------------------------------------------------
  # RF4 Binary CNN model candidates
  # ----------------------------------------------------------
  #
  # [OLD / baseline model]
  # - 2026-05-30 기존 binary 모델
  # - 기존 2.450GHz linked 데이터에서는 안정적
  # - 2026-06-04 외부 테스트 결과:
  #   * cf2450 Drone detect: 74/80 = 92.50%
  #   * cf2460 Drone detect: 136/150 = 90.67%
  #   * cf2465 Drone detect: 116/150 = 77.33%
  #   * 0604 background cf2450/cf2460/cf2465 FP: 0%
  #
  # OLD path:
  # outputs/ml/rf4_binary_20260530_no_controller_lr1e3_v2/best_model.pt
  #
  # [NEW / selected freqboost model]
  # - 2026-06-04 frequency boost fine-tuned model
  # - 기존 모델에서 fine-tuning
  # - 2.460 / 2.465GHz Drone-like 보강 목적
  # - best epoch: 9
  # - validation:
  #   * val_acc: 0.9937
  #   * DroneAcc: 0.9871
  #   * NotDroneAcc: 1.0000
  #   * FP_Drone: 0.0000
  #   * MissDrone: 0.0129
  # - 2026-06-04 외부 테스트 결과:
  #   * cf2450 Drone detect: 74/80 = 92.50%
  #   * cf2460 Drone detect: 143/150 = 95.33%
  #   * cf2465 Drone detect: 139/150 = 92.67%
  #   * 0604 background cf2450/cf2460/cf2465 FP: 0%
  #
  # NEW path:
  # outputs/ml/rf4_binary_20260604_freqboost_2460_2465_finetune_v1/best_model.pt
  #
  # 선택 방법:
  # - 이전 모델을 쓰고 싶으면 binary_model_path와 inference.model_path를 OLD path로 변경
  # - 새 모델을 쓰고 싶으면 binary_model_path와 inference.model_path를 NEW path로 유지
  # - runtime에서는 inference.model_path를 우선 사용한다.

  binary_model_path: outputs/ml/rf4_binary_20260604_freqboost_2460_2465_finetune_v1/best_model.pt

  # legacy / unused paths. 유지하되 runtime에서는 inference.model_path를 우선 사용한다.
  model_path: models/checkpoints/model.keras
  best_model_path: models/checkpoints/best_model.keras
  torch_model_path: models/checkpoints/model_torch.pth
  best_torch_model_path: models/checkpoints/best_model_torch.pth

train:
  batch_size: 32
  epochs: 50
  learning_rate: 0.001
  validation_split: 0.2
  seed: 42

export:
  tflite_path: models/tflite/model.tflite
  quantize: false

# ============================================================
# Runtime inference / decision policy
# ============================================================

inference:
  # Drone / NotDrone binary classifier
  backend: binary_flat

  # ----------------------------------------------------------
  # Runtime model selection
  # ----------------------------------------------------------
  #
  # [OLD model]
  # outputs/ml/rf4_binary_20260530_no_controller_lr1e3_v2/best_model.pt
  #
  # 특징:
  # - 기존 2.45GHz linked 데이터 기준 안정적
  # - cf2465에서는 Drone detect 77.33%로 낮았음
  #
  # [NEW selected model]
  # outputs/ml/rf4_binary_20260604_freqboost_2460_2465_finetune_v1/best_model.pt
  #
  # 특징:
  # - 2.460 / 2.465GHz 보강 fine-tuning 모델
  # - cf2460 detect: 90.67% -> 95.33%
  # - cf2465 detect: 77.33% -> 92.67%
  # - 0604 background FP: 0% 유지
  #
  # 현재 선택:
  # - 기본값은 NEW selected model 사용
  # - 이전 모델로 되돌리고 싶으면 아래 model_path만 OLD path로 바꾼다.
  model_path: outputs/ml/rf4_binary_20260530_no_controller_lr1e3_v2/best_model.pt

  device: cpu

  # ----------------------------------------------------------
  # CNN decision threshold
  # ----------------------------------------------------------
  # 기존 기본값은 0.50이었음.
  #
  # 2026-06-04 threshold sweep 결과:
  # - threshold 0.50:
  #   * 0528 background FP: 151/870 = 17.36%
  #   * 0528 drone detect: 100/100 = 100%
  # - threshold 0.70:
  #   * 0528 background FP: 3/870 = 0.34%
  #   * 0528 drone detect: 100/100 = 100%
  # - threshold 0.80:
  #   * 0528 background FP: 0/870 = 0%
  #   * 0528 drone detect: 100/100 = 100%
  #
  # 단일 block 판정만 사용할 경우:
  # - 보수적 운용: drone_threshold = 0.80
  #
  # temporal voting을 함께 사용할 경우:
  # - 추천 운용: drone_threshold = 0.70
  # - 최근 5 frame 중 3 frame 이상 Drone이면 confirmed
  drone_threshold: 0.70
  general_threshold: 0.50

  # ----------------------------------------------------------
  # Gain-dependent Drone threshold policy
  # ----------------------------------------------------------
  # 주의:
  # - 아래 gain_threshold_policy가 enabled: true이면
  #   위 drone_threshold보다 gain별 threshold가 우선 적용될 수 있다.
  #
  # 기존 정책:
  # - gain < 25        -> 0.50
  # - 25 <= gain < 30  -> 0.35
  # - gain >= 30       -> 0.80
  #
  # 2026-06-04 새 모델 기준:
  # - g25 조건에서 threshold 0.70 + temporal voting이 안정적이었음.
  # - 따라서 g25 sensitive threshold 0.35는 새 모델에서는 너무 낮을 수 있음.
  #
  # 현재 정책:
  # - 기본 threshold: 0.70
  # - gain 25~29.999: 0.70
  # - gain 30 이상: 0.80
  gain_threshold_policy:
    enabled: true
    default_drone_threshold: 0.70

    rules:
      - name: gain_25_freqboost_selected
        min_gain: 25
        max_gain: 29.999
        drone_threshold: 0.70

      - name: gain_30_or_higher_strict
        min_gain: 30
        max_gain: null
        drone_threshold: 0.80

  # ----------------------------------------------------------
  # Temporal voting
  # ----------------------------------------------------------
  # 단일 block만 보고 Drone 확정하지 않는다.
  #
  # 추천 운용값:
  # - drone_prob >= 0.70이면 raw Drone 후보
  # - 최근 5 frame 중 3 frame 이상 Drone 후보이면 confirmed Drone
  #
  # 2026-06-04 temporal voting sweep 결과:
  # - threshold 0.70, window 3, vote 2:
  #   * background FP rate = 0.0000
  #   * drone detect rate = 1.0000
  # - threshold 0.70, window 5, vote 3:
  #   * background FP rate = 0.0000
  #   * drone detect rate = 1.0000
  #
  # 선택 기준:
  # - 빠른 반응성 우선: window_size 3, confirmed_vote_k 2
  # - 안정성 우선: window_size 5, confirmed_vote_k 3
  #
  # 현재 설정은 안정성 우선.
  # AoA는 confirmed 이후에만 실행한다.
  temporal_voting:
    enabled: true
    window_size: 5
    candidate_vote_k: 2
    confirmed_vote_k: 3
    positive_class: Drone
    negative_class: NotDrone
    require_confirmed_before_aoa: true
    reject_to_scan: true