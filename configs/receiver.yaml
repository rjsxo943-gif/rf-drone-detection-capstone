# configs/receiver.yaml
#
# 이번 실행에서 어떤 입력 소스를 사용할지 정하는 설정 파일이다.
#
# source_type 사용법:
# - sim  : synthetic IQ 생성
# - file : 저장된 IQ 파일(.npy) 읽기
# - sdr  : 실제 SDR 입력(Pluto+)
#
# 현재 프로젝트 기준:
# - 처리 단위는 segment가 아니라 block
# - 1 block = 16,384 IQ samples
# - sample_rate = 5 MSPS 기준
# - 현재 실시간 파이프라인에서는 num_samples와 block_size를 같게 둔다.
#
# 기본 원칙:
# - block_size = 16384
# - num_samples = 16384
# - 즉, receiver가 한 번 읽으면 block 하나가 나온다.

source_type: sdr  # sim, file, sdr 중 하나 선택

sample_rate: 5000000
center_freq: 2437000000

block_size: 16384
num_samples: 16384

# sim/file 공통 기본 채널 수
# sim에서 RX0/RX1 2채널을 테스트하려면 2로 둔다.
# file 모드에서는 저장된 파일의 채널 수와 맞아야 한다.
num_channels: 2
#주의할 점은 file 모드야. num_channels: 2로 되어 있으면 
#file_path의 IQ 파일도 (2, N) 또는 (N, 2) 형태여야 해. 
#단일 채널 파일이면 num_channels: 1로 바꿔야 한다.


# source_type: file 일 때 사용할 파일 경로
file_path: data/raw_iq/test.npy

# source_type: sim 일 때 사용할 synthetic IQ 생성 설정
sim:
  tone_freq_norm: 0.0
  noise_std: 0.3
  burst_amplitude: 5

  # block_size 16384 기준:
  # burst_period 4096이면 block 하나 안에 burst 주기가 4번 들어감
  burst_period: 4096
  burst_length: 3000

  # RX1에 줄 고정 위상 offset
  # phaseoffset.py / AoA 테스트용
  # 0.0이면 RX0/RX1 위상 offset 없음
  channel_phase_offset_rad: 0.7

  seed: 42

# source_type: sdr 일 때 사용할 Pluto+ 설정
sdr:
  device: pluto_plus
  uri: ip:192.168.2.1

  channels: [0, 1]

  center_freq: 2437000000
  sample_rate: 5000000
  rf_bandwidth: 5000000

  gain_control_mode: manual
  gain: 15

  num_samples: 16384
  block_size: 16384

  # SDR 설정 직후 버릴 버퍼 수
  warmup_reads: 5

  # 중심 주파수 변경 직후 버릴 버퍼 수
  retune_warmup_reads: 3
