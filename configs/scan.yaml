scan:
  start_freq: 2435000000
  stop_freq: 2465000000
  step_freq: 5000000

  num_samples: 16384

  threshold: 4000000.0
  scan_blocks: 4
  min_pass_blocks: 2

  scan_score_db_threshold: 76.0
  precision_blocks_per_candidate: 10
  settle_sec: 0.02
  coherence_threshold: 0.001

  mode: full_cycle_triggered_analysis
  save_events: true

  save_spectrogram: true
  save_stft: false

  cnn_enabled: true

  # ----------------------------------------------------------
  # Precision hold mode
  # ----------------------------------------------------------
  # 흐름:
  # 1) 에너지 trigger
  # 2) CNN screening 5블럭
  # 3) confirmed면 precision hold 진입
  # 4) hold 중에는 1블럭씩 계속 확인
  # 5) Drone hit가 나오면 현재 block + 7까지 hold 연장
  # 6) hold_until_block을 지나면 scan 복귀
  # ----------------------------------------------------------
  precision_hold:
    enabled: true

    entry_screening:
      enabled: true
      precision_blocks: 5
      require_confirmed: true
      allow_candidate: false
      reject_not_drone: true

    hold_mode: sliding_block_grace

    # hold 중 analyzer.analyze() 1회에서 읽을 block 수.
    # block-level grace를 쓰기 위해 기본 1로 둔다.
    blocks_per_step: 1

    # Drone hit가 한 번 나오면 현재 hold block 기준 +7까지 무조건 관찰
    grace_blocks_after_drone: 7

    # 너무 오래 lock되는 것 방지
    max_hold_blocks: 100

    # hold 진입 직후 최소 관찰 block 수
    min_hold_blocks: 7

    # hold 연장 조건
    extend_on_raw_drone_hit: true
    extend_on_candidate: false
    extend_on_confirmed: false

    # 새 hold 진입 시 AoA smoothing history 초기화
    reset_aoa_smoothing_on_enter: true

    # block 사이 쉬는 시간
    block_delay_sec: 0.0
